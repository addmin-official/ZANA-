name: Unified CI/CD Deployment Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: production-deployment
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    name: Validate Codebase (Preflight & Quality)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # STAGE 1: Preflight Secrets Check (Run BEFORE npm ci, lint, typecheck, build for production pushes)
      - name: Preflight Secrets Check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          echo "Running Preflight checks for required deployment secrets..."
          MISSING_SECRETS=0

          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Missing secret CLOUDFLARE_API_TOKEN"
            MISSING_SECRETS=1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing secret CLOUDFLARE_ACCOUNT_ID"
            MISSING_SECRETS=1
          fi
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "::error::Missing secret FIREBASE_SERVICE_ACCOUNT"
            MISSING_SECRETS=1
          fi
          if [ -z "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "::error::Missing secret VITE_API_BASE_URL"
            MISSING_SECRETS=1
          fi

          if [ $MISSING_SECRETS -ne 0 ]; then
            echo "Preflight check failed. One or more required secrets are missing."
            exit 1
          fi
          echo "All preflight checks passed successfully."

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # STAGE 2: Lint
      - name: Run Linter
        run: |
          set -euo pipefail
          npm run lint 2>&1 | tee lint.log

      # STAGE 3: Typecheck
      - name: Run Typecheck
        run: |
          set -euo pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      # STAGE 3.5: Run Full Test Suite (Mandatory Gate)
      - name: Run Full Test Suite
        run: |
          set -euo pipefail
          npm test 2>&1 | tee test.log

      - name: Save Pipeline Start Time
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          mkdir -p deployment-started
          cat <<EOF > deployment-started/metadata-started.json
          {
            "deployment_started_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "deployment_started_epoch": $(date +%s)
          }
          EOF

      - name: Upload Validation and Start Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            lint.log
            typecheck.log
            test.log
            deployment-started/

  build:
    name: Build Application (Client, Server & Worker)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # STAGE 4: Worker Validation
      - name: Build Worker (Validation)
        run: |
          set -euo pipefail
          npm run build:worker 2>&1 | tee build-worker.log

      # STAGE 5: Application Build
      - name: Build Client and Server
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee build.log
          # Generate checksums for build verification
          find dist/ -type f | sort | xargs sha256sum > dist/checksums.txt
          echo "Generated checksums for build outputs:"
          cat dist/checksums.txt

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            dist/
            build.log
            build-worker.log

  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Build Outputs
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
          path: .

      - name: Verify Artifact Integrity
        run: |
          set -euo pipefail
          echo "Verifying artifact checksums..."
          sha256sum -c dist/checksums.txt
          
          echo "Verifying dist/client directory..."
          if [ ! -d "dist/client" ]; then
            echo "::error::dist/client directory is missing!"
            exit 1
          fi
          
          echo "Verifying Worker entrypoint..."
          if [ ! -f "src/worker/index.ts" ]; then
            echo "::error::Worker entrypoint src/worker/index.ts is missing!"
            exit 1
          fi
          
          echo "Verification successful!"

      # Resolve deterministic KV namespace binding
      - name: Resolve deterministic KV namespace binding
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          set -euo pipefail
          node scripts/resolve-kv.js
          
          # Verify production config validity
          jq empty wrangler.production.json
          
          # Dry run with wrangler deployment config
          npx wrangler deploy --config wrangler.production.json --dry-run

      # STAGE 6: Deploy Cloudflare Worker
      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler deploy --config wrangler.production.json 2>&1 | tee wrangler-deploy.log

      - name: Parse Worker Deployment Metadata
        if: always()
        run: |
          set -euo pipefail
          node -e "
          const fs = require('fs');
          let log = '';
          try { log = fs.readFileSync('wrangler-deploy.log', 'utf8'); } catch(e) {}
          const nameMatch = log.match(/Uploaded\s+([a-zA-Z0-9-]+)/i) || log.match(/Published\s+([a-zA-Z0-9-]+)/i);
          const worker_name = nameMatch ? nameMatch[1] : 'zana-api-worker';
          const idMatch = log.match(/Deployment ID:\s*([a-zA-Z0-9-]+)/i) || log.match(/Version:\s*([0-9]+)/i);
          const worker_deployment_id = idMatch ? idMatch[1] : null;
          fs.mkdirSync('metadata-worker', { recursive: true });
          fs.writeFileSync('metadata-worker/metadata-worker.json', JSON.stringify({ worker_name, worker_deployment_id }));
          "

      - name: Upload Worker Metadata & Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-deploy-log
          path: |
            wrangler-deploy.log
            metadata-worker/

  verify-worker:
    name: Verify Worker Live Health
    needs: deploy-worker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Verify Worker Health & CORS
        env:
          CLEANED_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          
          # Clean and remove trailing slash from base URL
          CLEANED_URL=$(echo "$CLEANED_URL" | sed 's/\/$//')
          export CLEANED_URL
          echo "Verifying live Cloudflare Worker at: $CLEANED_URL"
          
          # Validation Checks: Reject empty, HTTP, malformed, or non-canonical URLs
          if [ -z "$CLEANED_URL" ]; then
            echo "::error::API Base URL is empty!"
            exit 1
          fi
          
          # Use Node URL parsing to structurally validate (Objective 6)
          node -e "
          try {
            const u = new URL(process.env.CLEANED_URL);
            if (u.protocol !== 'https:') throw new Error('API Base URL must use HTTPS');
            if (!u.hostname) throw new Error('API Base URL hostname is missing');
            if (u.username || u.password) throw new Error('API Base URL must not contain credentials');
            if (u.search) throw new Error('API Base URL must not contain query parameters');
            if (u.hash) throw new Error('API Base URL must not contain a fragment');
            if (u.pathname !== '/' && u.pathname !== '') throw new Error('API Base URL must be the domain origin (pathname must be empty or /)');
            console.log('API Base URL structure is perfectly valid.');
          } catch (err) {
            console.error('::error::Invalid API Base URL: ' + err.message);
            process.exit(1);
          }
          "

          # 1. Diagnose redirect temporarily
          # We perform a diagnostic curl without following redirects first to log details.
          DIAG_HEADER_FILE=$(mktemp)
          DIAG_BODY_FILE=$(mktemp)
          
          echo "--- DIAGNOSTIC RUN ---"
          echo "Requested health URL: $CLEANED_URL/api/health"
          
          # Perform a non-redirecting curl to inspect the response details
          HTTP_STATUS=$(curl --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            -H "Origin: https://zana-app.web.app" \
            -D "$DIAG_HEADER_FILE" \
            -o "$DIAG_BODY_FILE" \
            -w "%{http_code}" \
            "$CLEANED_URL/api/health")
            
          echo "HTTP Status: $HTTP_STATUS"
          
          LOCATION_HEADER=$(grep -i '^location:' "$DIAG_HEADER_FILE" | awk -F': ' '{print $2}' | tr -d '\r\n ' || echo "None")
          echo "Location header: $LOCATION_HEADER"
          
          CONTENT_TYPE_HEADER=$(grep -i '^content-type:' "$DIAG_HEADER_FILE" | awk -F': ' '{print $2}' | tr -d '\r\n ' || echo "None")
          echo "Content-Type: $CONTENT_TYPE_HEADER"
          
          # Run diagnostic to find redirect count and effective destination
          DIAG_CURL_OUT=$(curl --silent --show-error --location --max-redirs 5 \
            --connect-timeout 10 \
            --max-time 20 \
            -H "Origin: https://zana-app.web.app" \
            -o /dev/null \
            -w "%{url_effective}|%{num_redirects}|%{http_code}|%{content_type}" \
            "$CLEANED_URL/api/health" || echo "failed")
          
          if [ "$DIAG_CURL_OUT" != "failed" ]; then
            export DIAG_CURL_OUT
            node -e "
            const [urlEffective, numRedirects, httpCode, contentType] = process.env.DIAG_CURL_OUT.split('|');
            let hostname = 'unknown';
            try { hostname = new URL(urlEffective).hostname; } catch(e) {}
            console.log('Redirect Count: ' + numRedirects);
            console.log('Final Effective URL: ' + urlEffective);
            console.log('Final Hostname: ' + hostname);
            console.log('Final HTTP Code: ' + httpCode);
            console.log('Final Content Type: ' + contentType);
            "
          else
            echo "Redirect count diagnosis failed"
          fi
          echo "----------------------"

          # 2. Permanent Strict Verification (Must be 200, zero redirects, valid JSON)
          RESPONSE_FILE=$(mktemp)
          HEADER_FILE=$(mktemp)

          # We do NOT use curl -L here because the health check must respond with 200 directly (zero redirects).
          HTTP_CODE=$(curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            -H "Origin: https://zana-app.web.app" \
            -D "$HEADER_FILE" \
            -o "$RESPONSE_FILE" \
            -w "%{http_code}" \
            "$CLEANED_URL/api/health")

          echo "HTTP Response Code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Worker health check returned status $HTTP_CODE (expected exactly 200, zero redirects)."
            cat "$RESPONSE_FILE"
            exit 1
          fi

          STATUS=$(jq -r '.status' "$RESPONSE_FILE" 2>/dev/null || echo "")
          SERVICE=$(jq -r '.service' "$RESPONSE_FILE" 2>/dev/null || echo "")
          OK_VAL=$(jq -r '.ok' "$RESPONSE_FILE" 2>/dev/null || echo "")

          echo "Parsed status: $STATUS"
          echo "Parsed service: $SERVICE"
          echo "Parsed ok: $OK_VAL"

          if [ "$OK_VAL" != "true" ]; then
            echo "::error::Invalid health ok value: '$OK_VAL' (expected 'true')"
            exit 1
          fi

          if [ "$STATUS" != "ok" ]; then
            echo "::error::Invalid health status: '$STATUS' (expected 'ok')"
            exit 1
          fi

          if [ "$SERVICE" != "zana-api-worker" ]; then
            echo "::error::Invalid service name: '$SERVICE' (expected 'zana-api-worker')"
            exit 1
          fi

          # Get the access-control-allow-origin header from HEADER_FILE (case-insensitive search, trim CR/LF and spaces)
          CORS_HEADER=$(grep -i 'access-control-allow-origin' "$HEADER_FILE" | head -n 1 | awk -F': ' '{print $2}' | tr -d '\r\n ' || echo "")

          echo "Received CORS Allowed Origin: '$CORS_HEADER'"

          if [ "$CORS_HEADER" != "https://zana-app.web.app" ]; then
            echo "::error::CORS header verification failed. Expected 'https://zana-app.web.app', got '$CORS_HEADER'"
            exit 1
          fi

          echo "Worker response verified successfully!"

  smoke-tests:
    name: Run Production Smoke Tests
    needs: verify-worker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # STAGE 8: Production Smoke Tests
      - name: Run Production Smoke Tests
        env:
          API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          npm run test:smoke 2>&1 | tee smoke-test-report.log

      - name: Upload Smoke Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: smoke-test-report.log

  security-checks:
    name: Run Security Exposure Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify No Secrets or Environment Files Exposed
        run: |
          set -euo pipefail
          echo "Scanning codebase for security exposures..."
          
          # Check for forbidden files
          FORBIDDEN_FILES=(".env" ".env.production" "wrangler.toml" "wrangler.production.json" "firebase-service-account.json")
          for file in "${FORBIDDEN_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "::error::Security Exposure Check Failed: Forbidden file '$file' exists in the codebase!"
              exit 1
            fi
          done

          # Check for typical API Key patterns or private keys accidentally committed
          # Excluding package.json, package-lock.json, and workflows/ci.yml to avoid false positives
          echo "Scanning for private keys..."
          if grep -r -l "BEGIN PRIVATE KEY" --exclude-dir=node_modules --exclude=package.json --exclude=package-lock.json --exclude-dir=.github .; then
            echo "::error::Security Exposure Check Failed: Found possible private key committed in the codebase!"
            exit 1
          fi

          echo "Security checks passed successfully!"

  release:
    name: Generate Release Tag & Metadata
    needs: [validate, build, deploy-worker, verify-worker, smoke-tests, security-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Pipeline Start Metadata
        uses: actions/download-artifact@v4
        with:
          name: validation-logs

      - name: Download Cloudflare Metadata
        uses: actions/download-artifact@v4
        with:
          name: wrangler-deploy-log

      - name: Generate Release Summary & Tag
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELEASE_TIME=$(date -u +"%Y%m%d-%H%M%S")
          RELEASE_TAG="release-${RELEASE_TIME}-${{ github.run_number }}-${SHORT_SHA}"
          
          echo "Release Tag: $RELEASE_TAG"
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          
          node -e "
          const fs = require('fs');

          let started = { deployment_started_at: new Date().toISOString(), deployment_started_epoch: Math.floor(Date.now() / 1000) };
          try {
            started = JSON.parse(fs.readFileSync('deployment-started/metadata-started.json', 'utf8'));
          } catch (e) {}

          let worker = { worker_name: null, worker_deployment_id: null };
          try {
            worker = JSON.parse(fs.readFileSync('metadata-worker/metadata-worker.json', 'utf8'));
          } catch (e) {}

          const completedAt = new Date().toISOString();
          const completedEpoch = Math.floor(Date.now() / 1000);
          const duration = Math.max(0, completedEpoch - started.deployment_started_epoch);

          const summary = {
            commit_sha: '${{ github.sha }}',
            short_sha: '$SHORT_SHA',
            github_run_id: '${{ github.run_id }}',
            github_run_number: '${{ github.run_number }}',
            deployment_started_at: started.deployment_started_at,
            deployment_completed_at: completedAt,
            deployment_duration_seconds: duration,
            release_tag: '$RELEASE_TAG',
            worker_name: worker.worker_name || null,
            worker_deployment_id: worker.worker_deployment_id || null,
            smoke_test_status: 'SUCCESS'
          };

          fs.writeFileSync('release-summary.json', JSON.stringify(summary, null, 2));
          "
          echo "Generated Real Release Metadata:"
          cat release-summary.json

      - name: Upload Release Summary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: release-summary.json

      - name: Create Git Tag and GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Create Git Tag
          git tag -a "$RELEASE_TAG" -m "Automated production release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          
          # Create GitHub Release with release-summary attached
          gh release create "$RELEASE_TAG" \
            --title "Production Release $RELEASE_TAG" \
            --notes "Automated release triggered by GitHub Action run ${{ github.run_id }}. Commit: ${{ github.sha }}." \
            release-summary.json

  report-status:
    name: Report Pipeline Status
    needs: [validate, build, deploy-worker, verify-worker, smoke-tests, security-checks, release]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Report Statuses to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_STATUS: ${{ needs.validate.result }}
          BUILD_STATUS: ${{ needs.build.result }}
          DEPLOY_STATUS: ${{ needs.deploy-worker.result }}
          VERIFY_STATUS: ${{ needs.verify-worker.result }}
          SMOKE_STATUS: ${{ needs.smoke-tests.result }}
          SECURITY_STATUS: ${{ needs.security-checks.result }}
          RELEASE_STATUS: ${{ needs.release.result }}
        run: |
          set -euo pipefail
          
          # Map function to convert GitHub Action job status to GitHub commit status state
          map_status() {
            local status="$1"
            case "$status" in
              success)
                echo "success"
                ;;
              failure)
                echo "failure"
                ;;
              *)
                echo "error"
                ;;
            esac
          }
          
          map_description() {
            local status="$1"
            local job_name="$2"
            case "$status" in
              success)
                echo "$job_name passed successfully"
                ;;
              failure)
                echo "$job_name failed"
                ;;
              skipped)
                echo "$job_name was skipped"
                ;;
              cancelled)
                echo "$job_name was cancelled"
                ;;
              *)
                echo "$job_name status: $status"
                ;;
            esac
          }

          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          TARGET_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"

          post_status() {
            local context="$1"
            local raw_status="$2"
            local state=$(map_status "$raw_status")
            local desc=$(map_description "$raw_status" "$context")
            
            echo "Publishing status to $context: state=$state, desc='$desc'"
            
            gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/statuses/${SHA}" \
              -f state="$state" \
              -f context="$context" \
              -f description="$desc" \
              -f target_url="$TARGET_URL" > /dev/null
          }

          post_status "ZANA/validate" "$VALIDATE_STATUS"
          post_status "ZANA/build" "$BUILD_STATUS"
          post_status "ZANA/deploy" "$DEPLOY_STATUS"
          post_status "ZANA/verify" "$VERIFY_STATUS"
          post_status "ZANA/smoke" "$SMOKE_STATUS"
          post_status "ZANA/release" "$RELEASE_STATUS"
