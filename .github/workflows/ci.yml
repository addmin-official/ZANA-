name: Unified CI/CD Deployment Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      # Pre-build worker verification to stop early if worker is broken
      - name: Build Worker (Validation)
        run: npm run build:worker

      - name: Build Client and Server
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      # Only deploy on push to main branch
      - name: Deploy Cloudflare Worker
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy
          echo "${{ secrets.GEMINI_API_KEY }}" | npx wrangler secret put GEMINI_API_KEY
          echo "${{ secrets.ALLOWED_ORIGINS }}" | npx wrangler secret put ALLOWED_ORIGINS

      - name: Authenticate Firebase
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > firebase-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/firebase-service-account.json" >> $GITHUB_ENV

      - name: Deploy Firebase Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx firebase deploy --only hosting

      - name: Run Production Smoke Tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run test:smoke

      # Cleanup sensitive files if any
      - name: Cleanup
        if: always()
        run: |
          rm -f firebase-service-account.json
