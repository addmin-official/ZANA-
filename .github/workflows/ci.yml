name: ZANA Production CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy after successful verification
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: zana-production-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PRODUCTION_URL: ${{ vars.ZANA_PRODUCTION_URL || 'https://zana-api-worker.zana-platform.workers.dev' }}
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://zana-api-worker.zana-platform.workers.dev' }}

jobs:
  verify:
    name: Verify and build production release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate production configuration
        run: npm run validate:production

      - name: Check patch whitespace
        run: git diff --check

      - name: Run lint and strict type checking
        run: |
          npm run lint
          npm run typecheck

      - name: Run all tests
        run: npm test

      - name: Build production application
        run: npm run build

      - name: Validate Worker and static assets
        run: npm run build:worker

      - name: Validate production outputs
        run: npm run validate:production -- --require-build

      - name: Create artifact integrity manifest
        run: |
          find dist -type f -print0 | sort -z | xargs -0 sha256sum > deployment-manifest.sha256
          sha256sum --check deployment-manifest.sha256

      - name: Upload verified production build
        uses: actions/upload-artifact@v4
        with:
          name: zana-production-build
          retention-days: 7
          if-no-files-found: error
          path: |
            dist/
            deployment-manifest.sha256

  deploy:
    name: Deploy verified release to Cloudflare
    needs: verify
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy == true)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    outputs:
      deployment_id: ${{ steps.deployment.outputs.deployment_id }}
    steps:
      - name: Checkout verified commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deployment dependencies
        run: npm ci --ignore-scripts

      - name: Download verified production build
        uses: actions/download-artifact@v4
        with:
          name: zana-production-build
          path: .

      - name: Verify artifact and configure production bindings
        env:
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          sha256sum --check deployment-manifest.sha256
          npm run validate:production -- --require-build
          npm run config:wrangler:production

      - name: Deploy Worker and Static Assets
        id: deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          DEPLOY_LOG="${RUNNER_TEMP}/wrangler-deploy.log"
          npx wrangler deploy dist/worker/index.js --config .wrangler/production.jsonc 2>&1 | tee "$DEPLOY_LOG"
          DEPLOYMENT_ID=$(sed -nE 's/.*(Version ID|Deployment ID):[[:space:]]*([a-fA-F0-9-]+).*/\2/p' "$DEPLOY_LOG" | tail -n 1)
          if [ -z "$DEPLOYMENT_ID" ]; then DEPLOYMENT_ID="not-reported-by-wrangler"; fi
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          {
            echo "### Cloudflare deployment"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Worker: \`zana-api-worker\`"
            echo "- Deployment ID: \`${DEPLOYMENT_ID}\`"
            echo "- URL: ${PRODUCTION_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-test:
    name: Verify production deployment
    needs: deploy
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy == true)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    steps:
      - name: Checkout smoke tests
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run non-destructive production smoke tests
        env:
          API_BASE_URL: ${{ env.PRODUCTION_URL }}
          CORS_TEST_ORIGIN: ${{ env.PRODUCTION_URL }}
        run: npm run test:smoke

      - name: Record verified release
        env:
          DEPLOYMENT_ID: ${{ needs.deploy.outputs.deployment_id }}
        run: |
          {
            echo "### ZANA production verified"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Deployment ID: \`${DEPLOYMENT_ID}\`"
            echo "- Smoke tests: passed"
            echo "- Production URL: ${PRODUCTION_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
