name: Unified CI/CD Deployment Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: production-deployment
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Codebase (Preflight & Quality)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # STAGE 1: Preflight Secrets Check (Run BEFORE npm ci, lint, typecheck, build for production pushes)
      - name: Preflight Secrets Check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Running Preflight checks for required deployment secrets..."
          MISSING_SECRETS=0

          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Missing secret CLOUDFLARE_API_TOKEN"
            MISSING_SECRETS=1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Missing secret CLOUDFLARE_ACCOUNT_ID"
            MISSING_SECRETS=1
          fi
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "::error::Missing secret FIREBASE_SERVICE_ACCOUNT"
            MISSING_SECRETS=1
          fi
          if [ -z "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "::error::Missing secret VITE_API_BASE_URL"
            MISSING_SECRETS=1
          fi

          if [ $MISSING_SECRETS -ne 0 ]; then
            echo "Preflight check failed. One or more required secrets are missing."
            exit 1
          fi
          echo "All preflight checks passed successfully."

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # STAGE 2: Lint
      - name: Run Linter
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      # STAGE 3: Typecheck
      - name: Run Typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Save Pipeline Start Time
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p deployment-started
          cat <<EOF > deployment-started/metadata-started.json
          {
            "deployment_started_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "deployment_started_epoch": $(date +%s)
          }
          EOF

      - name: Upload Validation and Start Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            lint.log
            typecheck.log
            deployment-started/

  build:
    name: Build Application (Client, Server & Worker)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # STAGE 4: Application Build
      # Wrangler validates and packages dist/client, so the application must
      # be built first on a clean CI runner.
      - name: Build Client and Server
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      # STAGE 5: Worker Validation
      - name: Build Worker (Validation)
        run: |
          set -o pipefail
          npm run build:worker 2>&1 | tee build-worker.log

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            dist/
            build.log
            build-worker.log

  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Verified Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
          path: .

      # STAGE 6: Deploy Cloudflare Worker
      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler deploy 2>&1 | tee wrangler-deploy.log

      - name: Parse Worker Deployment Metadata
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          let log = '';
          try { log = fs.readFileSync('wrangler-deploy.log', 'utf8'); } catch(e) {}
          const nameMatch = log.match(/Uploaded\s+([a-zA-Z0-9-]+)/i) || log.match(/Published\s+([a-zA-Z0-9-]+)/i);
          const worker_name = nameMatch ? nameMatch[1] : 'zana-api-worker';
          const idMatch = log.match(/Deployment ID:\s*([a-zA-Z0-9-]+)/i) || log.match(/Version:\s*([0-9]+)/i);
          const worker_deployment_id = idMatch ? idMatch[1] : null;
          fs.mkdirSync('metadata-worker', { recursive: true });
          fs.writeFileSync('metadata-worker/metadata-worker.json', JSON.stringify({ worker_name, worker_deployment_id }));
          "

      - name: Upload Worker Metadata & Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-deploy-log
          path: |
            wrangler-deploy.log
            metadata-worker/

  verify-worker:
    name: Verify Worker Live Health
    needs: deploy-worker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Verify Worker Health & CORS
        run: |
          echo "Verifying live Cloudflare Worker at: ${{ secrets.VITE_API_BASE_URL }}"
          
          RESPONSE_FILE=$(mktemp)
          HEADER_FILE=$(mktemp)

          HTTP_CODE=$(curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            -H "Origin: https://zana-app.web.app" \
            -D "$HEADER_FILE" \
            -o "$RESPONSE_FILE" \
            -w "%{http_code}" \
            "${{ secrets.VITE_API_BASE_URL }}/api/health")

          echo "HTTP Response Code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Worker health check returned status $HTTP_CODE (expected exactly 200)."
            cat "$RESPONSE_FILE"
            exit 1
          fi

          STATUS=$(jq -r '.status' "$RESPONSE_FILE" 2>/dev/null || echo "")
          SERVICE=$(jq -r '.service' "$RESPONSE_FILE" 2>/dev/null || echo "")

          echo "Parsed status: $STATUS"
          echo "Parsed service: $SERVICE"

          if [ "$STATUS" != "ok" ]; then
            echo "::error::Invalid health status: '$STATUS' (expected 'ok')"
            exit 1
          fi

          if [ "$SERVICE" != "zana-api-worker" ]; then
            echo "::error::Invalid service name: '$SERVICE' (expected 'zana-api-worker')"
            exit 1
          fi

          # Get the access-control-allow-origin header from HEADER_FILE (case-insensitive search, trim CR/LF and spaces)
          CORS_HEADER=$(grep -i 'access-control-allow-origin' "$HEADER_FILE" | head -n 1 | awk -F': ' '{print $2}' | tr -d '\r\n ' || echo "")

          echo "Received CORS Allowed Origin: '$CORS_HEADER'"

          if [ "$CORS_HEADER" != "https://zana-app.web.app" ]; then
            echo "::error::CORS header verification failed. Expected 'https://zana-app.web.app', got '$CORS_HEADER'"
            exit 1
          fi

          echo "Worker response verified successfully!"
          
  smoke-tests:
    name: Run Production Smoke Tests
    needs: verify-worker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # STAGE 8: Production Smoke Tests
      - name: Run Production Smoke Tests
        env:
          API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          set -o pipefail
          npm run test:smoke 2>&1 | tee smoke-test-report.log

      - name: Upload Smoke Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: smoke-test-report.log

  release:
    name: Generate Release Tag & Metadata
    needs: smoke-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Pipeline Start Metadata
        uses: actions/download-artifact@v4
        with:
          name: validation-logs

      - name: Download Cloudflare Metadata
        uses: actions/download-artifact@v4
        with:
          name: wrangler-deploy-log

      - name: Generate Release Summary & Tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELEASE_TIME=$(date -u +"%Y%m%d-%H%M%S")
          RELEASE_TAG="release-${RELEASE_TIME}-${{ github.run_number }}-${SHORT_SHA}"
          
          echo "Release Tag: $RELEASE_TAG"
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          
          node -e "
          const fs = require('fs');

          let started = { deployment_started_at: new Date().toISOString(), deployment_started_epoch: Math.floor(Date.now() / 1000) };
          try {
            started = JSON.parse(fs.readFileSync('deployment-started/metadata-started.json', 'utf8'));
          } catch (e) {}

          let worker = { worker_name: null, worker_deployment_id: null };
          try {
            worker = JSON.parse(fs.readFileSync('metadata-worker/metadata-worker.json', 'utf8'));
          } catch (e) {}

          const completedAt = new Date().toISOString();
          const completedEpoch = Math.floor(Date.now() / 1000);
          const duration = Math.max(0, completedEpoch - started.deployment_started_epoch);

          const summary = {
            commit_sha: '${{ github.sha }}',
            short_sha: '$SHORT_SHA',
            github_run_id: '${{ github.run_id }}',
            github_run_number: '${{ github.run_number }}',
            deployment_started_at: started.deployment_started_at,
            deployment_completed_at: completedAt,
            deployment_duration_seconds: duration,
            release_tag: '$RELEASE_TAG',
            worker_name: worker.worker_name || null,
            worker_deployment_id: worker.worker_deployment_id || null,
            smoke_test_status: 'SUCCESS'
          };

          fs.writeFileSync('release-summary.json', JSON.stringify(summary, null, 2));
          "
          echo "Generated Real Release Metadata:"
          cat release-summary.json

      - name: Upload Release Summary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: release-summary.json

      - name: Create Git Tag and GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Create Git Tag
          git tag -a "$RELEASE_TAG" -m "Automated production release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          
          # Create GitHub Release with release-summary attached
          gh release create "$RELEASE_TAG" \
            --title "Production Release $RELEASE_TAG" \
            --notes "Automated release triggered by GitHub Action run ${{ github.run_id }}. Commit: ${{ github.sha }}." \
            release-summary.json

  report-status:
    name: Publish Pipeline Status
    needs:
      - validate
      - build
      - deploy-worker
      - verify-worker
      - smoke-tests
      - release
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish Job Results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy-worker.result }}
          VERIFY_RESULT: ${{ needs.verify-worker.result }}
          SMOKE_RESULT: ${{ needs.smoke-tests.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
        run: |
          publish_status() {
            JOB_NAME="$1"
            JOB_RESULT="$2"
            case "$JOB_RESULT" in
              success) STATE="success" ;;
              failure) STATE="failure" ;;
              *) STATE="error" ;;
            esac

            jq -n \
              --arg state "$STATE" \
              --arg context "ZANA/$JOB_NAME" \
              --arg description "$JOB_NAME: $JOB_RESULT" \
              --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              '{state: $state, context: $context, description: $description, target_url: $target_url}' \
              > status.json

            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              --data @status.json
          }

          publish_status validate "$VALIDATE_RESULT"
          publish_status build "$BUILD_RESULT"
          publish_status deploy "$DEPLOY_RESULT"
          publish_status verify "$VERIFY_RESULT"
          publish_status smoke "$SMOKE_RESULT"
          publish_status release "$RELEASE_RESULT"
